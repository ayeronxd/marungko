<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1 - Marungko Interactive Chalkboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Internal styles removed - now using unified framework in style.css */
    </style>
</head>

<body>
    <div class="frame">
        <div class="chalkboard">

            <!-- DECODE Logo top right -->
            <div class="logo-placeholder">
                <img src="../images/decode.png" alt="Logo">
            </div>

            <div class="doodle-layer" aria-hidden="true">
                <span class="doodle cloud" style="--x: 12%; --y: 18%; --w: 180px; --h: 80px; --t: 28s;"></span>
                <span class="doodle cloud" style="--x: 70%; --y: 12%; --w: 160px; --h: 70px; --t: 26s;"></span>
                <span class="doodle cloud" style="--x: 86%; --y: 62%; --w: 200px; --h: 90px; --t: 30s;"></span>
                <span class="doodle blob" style="--x: 20%; --y: 70%; --w: 140px; --h: 100px; --t: 24s;"></span>
                <span class="doodle blob" style="--x: 56%; --y: 36%; --w: 120px; --h: 90px; --t: 22s;"></span>
                <span class="doodle sparkle" style="--x: 32%; --y: 22%; --size: 16px; --t: 5.5s;"></span>
                <span class="doodle sparkle" style="--x: 62%; --y: 18%; --size: 12px; --t: 6.5s;"></span>
                <span class="doodle sparkle" style="--x: 78%; --y: 40%; --size: 14px; --t: 7s;"></span>
                <span class="doodle sparkle" style="--x: 42%; --y: 80%; --size: 10px; --t: 6s;"></span>
            </div>

            <!-- Lesson 1 Screen -->
            <div id="lesson1" class="screen active lesson-screen">

                <!-- Instruction text -->
                <div class="lesson-header-row">
                    <p class="lesson-heading">
                        Piliin ang <span class="highlight-yellow">unang</span> tunog ng mga sumusunod na larawan.
                    </p>
                </div>

                <!-- Content row: key image + answer choices -->
                <div class="lesson-content-row">

                    <!-- Key image in question card -->
                    <div class="lesson-key-area">
                        <div class="lesson-question-card">
                            <div class="lesson-question-badge">&#10067;</div>
                            <img class="lesson-key-img" src="../images/susi.png" alt="Susi (Key)">
                        </div>
                    </div>

                    <!-- Answer circles -->
                    <div class="lesson-choices-row">

                        <!-- Circle A (correct) -->
                        <div class="lesson-choice-circle orange" onclick="checkAnswer(this, false)" title="a">
                            <div class="letter"><span>a</span></div>
                        </div>

                        <!-- Circle M (wrong) -->
                        <div class="lesson-choice-circle green" onclick="checkAnswer(this, false)" title="m">
                            <div class="letter"><span>m</span></div>
                        </div>

                        <!-- Circle S (wrong) -->
                        <div class="lesson-choice-circle yellow" onclick="checkAnswer(this, true)" title="s">
                            <div class="letter"><span>s</span></div>
                        </div>

                    </div>
                </div>

                <!-- Feedback panel -->
                <div class="lesson-feedback-panel" id="l1-feedback-panel">
                    <div class="icon" id="l1-feedback-icon"></div>
                    <div class="title" id="l1-feedback-title"></div>
                    <div class="sub-text" id="l1-feedback-sub"></div>
                </div>

                <!-- Back button (book) (bottom right) -->
                <div class="home-btn" role="button" tabindex="0" onclick="goBack()"
                    onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();goBack();}"
                    title="Back to Notebook Menu">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <!-- Left page -->
                        <path d="M10,18 Q10,14 14,13 Q30,10 48,15 L48,85 Q30,80 14,83 Q10,84 10,80 Z" fill="#f5e6c8"
                            stroke="#c8a96e" stroke-width="2.5" stroke-linejoin="round" />
                        <!-- Right page -->
                        <path d="M90,18 Q90,14 86,13 Q70,10 52,15 L52,85 Q70,80 86,83 Q90,84 90,80 Z" fill="#fdf3de"
                            stroke="#c8a96e" stroke-width="2.5" stroke-linejoin="round" />
                        <!-- Spine -->
                        <rect x="46" y="12" width="8" height="74" rx="2" fill="#b08030" />
                        <!-- Left page lines (chalk marks) -->
                        <line x1="18" y1="30" x2="44" y2="28" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <line x1="18" y1="40" x2="44" y2="38" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <line x1="18" y1="50" x2="44" y2="48" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <line x1="18" y1="60" x2="44" y2="58" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <!-- Right page lines (chalk marks) -->
                        <line x1="56" y1="28" x2="82" y2="30" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <line x1="56" y1="38" x2="82" y2="40" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <line x1="56" y1="48" x2="82" y2="50" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <line x1="56" y1="58" x2="82" y2="60" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"
                            opacity="0.7" />
                        <!-- Chalk star accent on right page -->
                        <text x="65" y="78" font-size="16" text-anchor="middle" fill="#e07830"
                            font-family="sans-serif">&#9733;</text>
                    </svg>
                </div>

            </div>

            <!-- Sound effects -->
            <audio id="sfx-correct" src="../audio/correct.mp3" preload="auto"></audio>
            <audio id="sfx-wrong" src="../audio/wrong.mp3" preload="auto"></audio>

        </div>
    </div>

    <script>
        function goBack() {
            // Always return to Page 11 so the user can choose another notebook.
            window.location.href = 'dafs.html#page11';
        }

        function checkAnswer(el, isCorrect) {
            const panel = document.getElementById('l1-feedback-panel');
            const icon = document.getElementById('l1-feedback-icon');
            const title = document.getElementById('l1-feedback-title');
            const sub = document.getElementById('l1-feedback-sub');

            // Reset all circles
            document.querySelectorAll('.l1-choice').forEach(c => {
                c.style.outline = 'none';
                c.style.filter = '';
            });

            // Play sound
            const sfx = document.getElementById(isCorrect ? 'sfx-correct' : 'sfx-wrong');
            sfx.currentTime = 0;
            sfx.play();

            if (isCorrect) {
                panel.className = 'lesson-feedback-panel show correct';
                icon.textContent = String.fromCodePoint(0x1f31f);
                title.textContent = 'Tama!';
                sub.textContent = 'Napakagaling mo!';
                el.style.outline = '6px solid #2ecc71';
                el.style.filter = 'brightness(1.15)';
            } else {
                panel.className = 'lesson-feedback-panel show wrong';
                icon.textContent = String.fromCodePoint(0x1f60a);
                title.textContent = 'Subukan Muli!';
                sub.textContent = 'Kaya mo yan, try ulit!';
                el.style.outline = '6px solid #e74c3c';
                el.style.filter = 'brightness(0.85)';
            }

            panel.classList.add('show');
            setTimeout(() => {
                panel.className = 'lesson-feedback-panel';
                el.style.outline = 'none';
                el.style.filter = 'none';
                if (isCorrect) {
                    localStorage.setItem('lesson1_done', '1');
                    localStorage.removeItem('lesson1_wrong');
                    window.location.href = 'dafs.html#page11';
                } else {
                    localStorage.setItem('lesson1_wrong', '1');
                    localStorage.removeItem('lesson1_done');
                    window.location.href = 'dafs.html#page11';
                }
            }, 1800);
        }
    </script>
</body>

</html>
