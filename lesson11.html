<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 11 - Marungko</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Layout for Lesson 11 */
        .lesson11-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 40px 60px;
            box-sizing: border-box;
        }

        /* Left side character */
        .character-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: center;
            padding-bottom: 0;
        }

        .character-section img {
            max-height: 450px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4));
            margin-bottom: 0px;
            transform: translateY(-20px); /* Moves the image slightly up */
        }

        .character-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 72px;
            font-weight: 500;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
            margin-top: -30px; /* Pull text slightly up */
        }

        /* Right side cards */
        .cards-section {
            display: flex;
            gap: 40px;
            align-items: center;
            height: 100%;
        }

        /* Polaroid style card */
        .pet-card {
            width: 300px;
            background: white;
            border: 6px solid #222;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .pet-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        }

        .pet-card-img {
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-bottom: 2px solid #ccc;
        }

        .pet-card-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pet-card-text {
            padding: 20px 0;
            font-family: 'Fredoka', sans-serif;
            font-size: 48px;
            font-weight: 500;
            color: black;
            letter-spacing: 1px;
        }

        .back-btn-custom {
            position: absolute;
            bottom: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .back-btn-custom:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .back-btn-custom::before {
            content: '';
            display: inline-block;
            border: solid white;
            border-width: 0 5px 5px 0;
            padding: 6px;
            transform: rotate(135deg);
            margin-left: 6px;
        }
    </style>
</head>

<body>
    <div class="frame">
        <div class="chalkboard">

            <!-- DECODE Logo top right -->
            <div class="logo-placeholder">
                <img src="images/decode.png" alt="Logo">
            </div>

            <!-- Main screen -->
            <div id="lesson11" class="screen active">

                <div class="lesson11-container">

                    <!-- Left Character -->
                    <div class="character-section">
                        <img src="images/kuya.png" alt="Kuya">
                        <div class="character-text">Kuya</div>
                    </div>

                    <!-- Right Cards -->
                    <div class="cards-section">
                        <!-- Dog Card -->
                        <div class="pet-card" onclick="checkAnswer(this, true)">
                            <div class="pet-card-img">
                                <img src="images/aso.png" alt="Aso">
                            </div>
                            <div class="pet-card-text">aso</div>
                        </div>

                        <!-- Cat Card -->
                        <div class="pet-card" onclick="checkAnswer(this, false)">
                            <div class="pet-card-img">
                                <img src="images/pusa.png" alt="Pusa">
                            </div>
                            <div class="pet-card-text">pusa</div>
                        </div>
                    </div>

                </div>

                <!-- Feedback panel -->
                <div class="lesson-feedback-panel" id="l11-feedback-panel">
                    <div class="icon" id="l11-feedback-icon"></div>
                    <div class="title" id="l11-feedback-title"></div>
                    <div class="sub-text" id="l11-feedback-sub"></div>
                </div>

                <!-- Custom back button (bottom left) -->
                <div class="back-btn-custom" onclick="window.location.href='lesson10.html'"></div>

            </div>

            <!-- Sound effects -->
            <audio id="sfx-correct" src="audio/correct.mp3" preload="auto"></audio>
            <audio id="sfx-wrong" src="audio/wrong.mp3" preload="auto"></audio>

        </div>
    </div>

    <script>
        function checkAnswer(el, isCorrect) {
            const panel = document.getElementById('l11-feedback-panel');
            const icon = document.getElementById('l11-feedback-icon');
            const title = document.getElementById('l11-feedback-title');
            const sub = document.getElementById('l11-feedback-sub');

            // Reset selection style if any
            document.querySelectorAll('.pet-card').forEach(c => {
                c.style.outline = 'none';
                c.style.filter = '';
            });

            // Play sound
            const sfx = document.getElementById(isCorrect ? 'sfx-correct' : 'sfx-wrong');
            sfx.currentTime = 0;
            sfx.play();

            if (isCorrect) {
                panel.className = 'lesson-feedback-panel show correct';
                icon.textContent = '🌟';
                title.textContent = 'Tama!';
                sub.textContent = 'Napakagaling mo!';
                el.style.outline = '6px solid #2ecc71';
                el.style.filter = 'brightness(1.15)';
            } else {
                panel.className = 'lesson-feedback-panel show wrong';
                icon.textContent = '😊';
                title.textContent = 'Subukan Muli!';
                sub.textContent = 'Kaya mo yan, try ulit!';
                el.style.outline = '6px solid #e74c3c';
                el.style.filter = 'brightness(0.85)';
            }

            setTimeout(() => {
                panel.className = 'lesson-feedback-panel';
                el.style.outline = 'none';
                el.style.filter = 'none';

                // Navigation logic (consistent with other lessons)
                if (isCorrect) {
                    localStorage.setItem('lesson11_done', '1');
                    localStorage.removeItem('lesson11_wrong');
                    window.location.href = 'lesson10.html';
                } else {
                    localStorage.setItem('lesson11_wrong', '1');
                    localStorage.removeItem('lesson11_done');
                    window.location.href = 'lesson10.html';
                }
            }, 1800);
        }
    </script>
</body>

</html>
